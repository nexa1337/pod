<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXA Admin Panel - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body class="admin-login-page">
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <div class="login-logo">
                    <svg viewBox="0 0 350 80" xmlns="http://www.w3.org/2000/svg" style="width: 150px; height: 40px;">
                        <text x="5" y="55" style="font-family: Arial, sans-serif; font-weight: 900; font-size: 40px; letter-spacing: 8px; fill: rgb(106, 121, 250);">N E X A</text>
                        <text x="220" y="55" style="font-family: Arial, sans-serif; font-weight: 900; font-size: 40px; letter-spacing: 2px; fill: rgb(106, 121, 250);">1337</text>
                    </svg>
                </div>
                <h1>Admin Panel</h1>
                <p>Manage your store with ease</p>
            </div>

            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="username"><i class="fas fa-user"></i> Username</label>
                    <input type="text" id="username" name="username" required placeholder="Enter your username">
                </div>

                <div class="form-group">
                    <label for="password"><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="password" name="password" required placeholder="Enter your password">
                </div>

                <div class="form-group checkbox">
                    <input type="checkbox" id="rememberMe" name="rememberMe">
                    <label for="rememberMe">Remember me</label>
                </div>

                <button type="submit" class="btn-login">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </form>

            <div class="login-footer">
                <p><i class="fas fa-info-circle"></i> Default credentials: admin / admin123</p>
            </div>
        </div>
    </div>

    <script src="js/admin-auth.js"></script>
</body>
</html>
